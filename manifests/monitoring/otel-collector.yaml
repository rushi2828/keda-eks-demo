# =============================================================================
# OpenTelemetry Collector — deployed as a DaemonSet
#
# Role in this stack:
#   - Receives traces from producer/consumer via OTLP (gRPC + HTTP)
#   - Exports traces to Grafana Tempo (or Jaeger if preferred)
#   - Scrapes its own /metrics endpoint (picked up by ServiceMonitor)
#   - Enriches spans with Kubernetes pod/node metadata
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    # ── Receivers ──────────────────────────────────────────────────────────
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317    # Apps send traces here (gRPC)
          http:
            endpoint: 0.0.0.0:4318    # Apps send traces here (HTTP/protobuf)

      # Also collect host-level metrics from nodes
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          network: {}

    # ── Processors ─────────────────────────────────────────────────────────
    processors:
      # Adds k8s pod name, namespace, node, container labels to every span
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name

      # Drop spans shorter than 1ms to reduce noise
      filter/drop_health:
        traces:
          span:
            - 'attributes["http.route"] == "/healthz"'

      # Batch spans before export — reduces network calls
      batch:
        timeout: 5s
        send_batch_size: 1024

      # Cap memory to prevent OOM
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64

    # ── Exporters ──────────────────────────────────────────────────────────
    exporters:
      # Grafana Tempo — distributed tracing backend
      otlp/tempo:
        endpoint: http://tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

      # Prometheus metrics from OTel collector itself
      prometheus:
        endpoint: "0.0.0.0:8889"

      # Debug: log spans to stdout (disable in production)
      debug:
        verbosity: basic

    # ── Extensions ─────────────────────────────────────────────────────────
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777

    # ── Pipelines ──────────────────────────────────────────────────────────
    service:
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, filter/drop_health, batch]
          exporters:  [otlp/tempo]
        metrics:
          receivers:  [otlp, hostmetrics]
          processors: [memory_limiter, batch]
          exporters:  [prometheus]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: opentelemetry-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
    spec:
      serviceAccountName: otel-collector-sa
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args: ["--config=/conf/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8889
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /conf
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
# Service — so app pods can find the collector by DNS
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: opentelemetry-collector
spec:
  selector:
    app.kubernetes.io/name: opentelemetry-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8889
      targetPort: 8889
---
# RBAC — OTel collector needs read access to pod/node metadata
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-role
rules:
  - apiGroups: [""]
    resources: [nodes, pods, namespaces, endpoints]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [replicasets, deployments, daemonsets, statefulsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-role
subjects:
  - kind: ServiceAccount
    name: otel-collector-sa
    namespace: monitoring
